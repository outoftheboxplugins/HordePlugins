name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Setup UE workspace
        id: ue
        uses: outoftheboxplugins/BuildMachines/.github/actions/setup-ue-workspace@master
        with:
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-token: ${{ secrets.DOCKER_TOKEN }}
          ue-version: "5.7"

      - name: Setup UE Dotnet
        uses: outoftheboxplugins/BuildMachines/.github/actions/setup-ue-dotnet@master
        with:
          ue-root: ${{ steps.ue.outputs.ue-root }}

      - uses: actions/checkout@v4

      - name: CI Hacks
        working-directory: ${{ steps.ue.outputs.ue-root }}
        run: |
          echo "Disabling Epic's tests since they are not our responsibility and are failing on Github runners."
          cat > Engine/Source/Programs/Horde/Scripts/test.sh <<'EOF'
          #!/bin/bash
          echo "Tests skipped in CI"
          EOF

      - name: Install Server plugins
        uses: outoftheboxplugins/BuildMachines/.github/actions/install-server-plugins@master
        with:
          ue-root: ${{ steps.ue.outputs.ue-root }}
          source-root: ${{ github.workspace }}/Server
          plugins: |
            HordeServer.StorageReporter

      - name: Install Dashboard plugins
        uses: outoftheboxplugins/BuildMachines/.github/actions/install-dashboard-plugins@master
        with:
          ue-root: ${{ steps.ue.outputs.ue-root }}
          source-root: ${{ github.workspace }}/Dashboard
          plugins: |
            storage-reporter

      - name: Run BuildGraph
        working-directory: ${{ steps.ue.outputs.ue-root }}
        run: |
          ./Engine/Build/BatchFiles/RunUAT.sh BuildGraph -Script=Engine/Source/Programs/Horde/BuildHorde.xml -Target="Build HordeServer with Dashboard"
